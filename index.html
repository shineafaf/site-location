<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studios à Louer – 8 Rue du Vieux Faubourg, Lille</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue-deep: #0d1b4b;
      --blue-mid: #1a3285;
      --blue-light: #2a4fcf;
      --purple-rich: #6b21a8;
      --purple-mid: #9333ea;
      --purple-soft: #c084fc;
      --gold: #e8c97e;
      --white: #f5f3ff;
      --text-light: #d4d0f5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--blue-deep);
      color: var(--white);
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(147,51,234,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(42,79,207,0.3) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(107,33,168,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2.5rem;
      background: rgba(13,27,75,0.75);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(192,132,252,0.15);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--purple-soft);
      letter-spacing: 0.05em;
    }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--purple-soft); }
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 9rem 2rem 5rem;
    }
    .hero-tag {
      display: inline-block;
      background: rgba(147,51,234,0.2);
      border: 1px solid rgba(192,132,252,0.4);
      color: var(--purple-soft);
      font-size: 0.74rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 1.2rem;
      border-radius: 100px;
      margin-bottom: 1.8rem;
      animation: fadeUp 0.8s ease both;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 7vw, 5rem);
      line-height: 1.1;
      max-width: 780px;
      animation: fadeUp 0.9s 0.1s ease both;
    }
    .hero h1 em {
      font-style: italic;
      background: linear-gradient(135deg, var(--purple-soft), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      margin-top: 1.4rem;
      color: var(--text-light);
      font-size: 1.05rem;
      font-weight: 300;
      max-width: 500px;
      line-height: 1.7;
      animation: fadeUp 1s 0.2s ease both;
    }
    .hero-cta {
      margin-top: 2.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 1s 0.3s ease both;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--purple-rich), var(--blue-light));
      color: #fff;
      box-shadow: 0 4px 24px rgba(107,33,168,0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(107,33,168,0.6);
    }
    .btn-outline {
      background: transparent;
      color: var(--purple-soft);
      border: 1px solid rgba(192,132,252,0.5);
    }
    .btn-outline:hover {
      background: rgba(192,132,252,0.08);
      transform: translateY(-2px);
    }
    section {
      position: relative;
      z-index: 1;
      padding: 6rem 2rem;
    }
    .section-label {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--purple-soft);
      margin-bottom: 0.8rem;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      text-align: center;
      margin-bottom: 1rem;
    }
    .section-sub {
      text-align: center;
      color: var(--text-light);
      font-size: 0.98rem;
      font-weight: 300;
      max-width: 540px;
      margin: 0 auto 3.5rem;
      line-height: 1.7;
    }
    .divider {
      width: 50px;
      height: 2px;
      background: linear-gradient(90deg, var(--purple-mid), var(--blue-light));
      margin: 0 auto 3.5rem;
      border-radius: 2px;
    }
    .studios-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 2.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .studio-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(192,132,252,0.15);
      border-radius: 20px;
      overflow: hidden;
      transition: transform 0.4s, box-shadow 0.4s;
      backdrop-filter: blur(8px);
    }
    .studio-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(107,33,168,0.3);
    }
    .gallery {
      position: relative;
      width: 100%;
      height: 260px;
      overflow: hidden;
    }
    .gallery img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .gallery img.active { opacity: 1; }
    .gallery-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(13,27,75,0.7);
      border: 1px solid rgba(192,132,252,0.3);
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.3s;
    }
    .gallery-btn:hover { background: rgba(107,33,168,0.7); }
    .gallery-btn.prev { left: 10px; }
    .gallery-btn.next { right: 10px; }
    .gallery-dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .gallery-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: background 0.3s;
    }
    .gallery-dot.active { background: var(--purple-soft); }
    .studio-body { padding: 2rem; }
    .studio-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-style: italic;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }
    .studio-size {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--purple-soft);
      margin-bottom: 1.3rem;
    }
    .studio-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-bottom: 1.8rem;
    }
    .studio-features li {
      font-size: 0.88rem;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .studio-features li::before {
      content: '✦';
      color: var(--purple-soft);
      font-size: 0.6rem;
      flex-shrink: 0;
    }
    #reservation {
      background: rgba(255,255,255,0.02);
      border-top: 1px solid rgba(192,132,252,0.1);
      border-bottom: 1px solid rgba(192,132,252,0.1);
    }
    .booking-box {
      max-width: 660px;
      margin: 0 auto;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(192,132,252,0.2);
      border-radius: 20px;
      padding: 3rem;
      backdrop-filter: blur(12px);
    }
    .form-group { margin-bottom: 1.3rem; }
    label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--purple-soft);
      margin-bottom: 0.45rem;
    }
    input, select, textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(192,132,252,0.25);
      border-radius: 8px;
      color: var(--white);
